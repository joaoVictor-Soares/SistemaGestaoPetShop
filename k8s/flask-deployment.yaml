apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: gestao-petshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: k8s/cadastro-flask:1.0 # Use o mesmo nome do docker build
          imagePullPolicy: Never        # Força o uso da imagem local
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: flask-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: flask-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: flask-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: # Use secretKeyRef em vez de configMapKeyRef
                  name: mysql-secret
                  key: MYSQL_PASSWORD